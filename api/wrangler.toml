name = "cms-api"
main = "src/index.ts"
compatibility_date = "2026-02-25"

# KV命名空间（保持原有）
kv_namespaces = [
  { binding = "KV", id = "byt-cms" }
]

# 环境变量（夸克网盘API密钥）
[vars]
QUARK_API_KEY = "你的夸克网盘API Key"
QUARK_API_SECRET = "你的夸克网盘API Secret"
ALIYUN_ACCESS_TOKEN = "你的阿里云盘AccessToken"
ALIYUN_REFRESH_TOKEN = "你的阿里云盘RefreshToken" # 可选自动刷新

# 定时任务（主调度任务，每分钟执行一次，用于分发不同源的抓取）
triggers = [
  { crons = ["* * * * *"] }
]