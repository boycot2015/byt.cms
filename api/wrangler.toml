name = "cms-api"
main = "src/index.ts"
compatibility_date = "2026-02-25"

# KV命名空间（保持原有）
kv_namespaces = [
  { binding = "KV", id = "byt-cms" }
]

[[
r2_buckets
]]
binding = "UPLOAD_BUCKET" # 必须和代码中变量名一致
bucket_name = "blog" # 你的 R2 存储桶名称

# 环境变量（夸克网盘API密钥）
[vars]
QUARK_API_KEY = "你的夸克网盘API Key"
QUARK_API_SECRET = "你的夸克网盘API Secret"
ALIYUN_ACCESS_TOKEN = "你的阿里云盘AccessToken"
ALIYUN_REFRESH_TOKEN = "你的阿里云盘RefreshToken" # 可选自动刷新
JIANGUOYUN_USERNAME = "boycot2017@163.com"
JIANGUOYUN_APP_PASSWORD = "agagm2wra6wai9mb"

# 定时任务（主调度任务，每5分钟执行一次，用于分发不同源的抓取）
triggers = [
  { crons = ["*/5 * * * *"] }
]


